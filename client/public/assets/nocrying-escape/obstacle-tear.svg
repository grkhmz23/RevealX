<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Teardrop obstacle -->
  <ellipse cx="32" cy="56" rx="15" ry="4" fill="#0066CC" opacity="0.4"/>
  
  <!-- Main teardrop shape -->
  <path d="M32 10 Q20 25 20 40 Q20 52 32 52 Q44 52 44 40 Q44 25 32 10 Z" fill="#4FC3F7" stroke="#0288D1" stroke-width="2"/>
  
  <!-- Inner highlight -->
  <path d="M32 15 Q26 25 26 38 Q26 45 32 45 Q38 45 38 38 Q38 25 32 15 Z" fill="#87CEEB" opacity="0.7"/>
  
  <!-- Shine effect -->
  <ellipse cx="28" cy="25" rx="4" ry="8" fill="#FFFFFF" opacity="0.6"/>
  <ellipse cx="30" cy="28" rx="2" ry="4" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Ripple effect at bottom -->
  <ellipse cx="32" cy="50" rx="12" ry="3" fill="none" stroke="#4FC3F7" stroke-width="1" opacity="0.6">
    <animate attributeName="rx" values="12;18;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Sadness particles -->
  <circle cx="24" cy="35" r="1" fill="#4FC3F7" opacity="0.8">
    <animate attributeName="cy" values="35;45;35" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="32" r="1" fill="#4FC3F7" opacity="0.7">
    <animate attributeName="cy" values="32;42;32" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
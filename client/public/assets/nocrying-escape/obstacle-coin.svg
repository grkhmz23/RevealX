<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Broken coin obstacle -->
  <ellipse cx="32" cy="56" rx="18" ry="4" fill="#B8860B" opacity="0.4"/>
  
  <!-- Main coin (broken) -->
  <circle cx="32" cy="32" r="22" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Crack through the middle -->
  <path d="M15 20 Q32 35 49 44" stroke="#8B0000" stroke-width="3" fill="none"/>
  <path d="M15 20 Q32 35 49 44" stroke="#FF0000" stroke-width="1" fill="none"/>
  
  <!-- Coin details (SOL symbol broken) -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Broken SOL symbol -->
  <path d="M25 28 L35 28" stroke="#B8860B" stroke-width="2"/>
  <path d="M28 32 L38 32" stroke="#B8860B" stroke-width="2"/>
  <path d="M25 36 L32 36" stroke="#B8860B" stroke-width="2"/>
  <path d="M35 36 L39 36" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Crack fragments -->
  <polygon points="45,25 50,20 48,28" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <polygon points="18,38 12,42 20,45" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <polygon points="35,15 40,10 38,18" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Danger sparks -->
  <line x1="20" y1="25" x2="16" y2="21" stroke="#FF6B35" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="44" y1="39" x2="48" y2="43" stroke="#FF6B35" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <line x1="32" y1="12" x2="32" y2="8" stroke="#FF6B35" stroke-width="2" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="0.8s" repeatCount="indefinite"/>
  </line>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Demo ribbon badge -->
  <defs>
    <linearGradient id="demoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main ribbon background -->
  <path d="M10 0 L110 0 L120 20 L110 40 L10 40 L0 20 Z" fill="url(#demoGradient)" stroke="#CC5500" stroke-width="1"/>
  
  <!-- Inner glow -->
  <path d="M12 3 L108 3 L117 20 L108 37 L12 37 L3 20 Z" fill="none" stroke="#FFB366" stroke-width="1" opacity="0.8"/>
  
  <!-- DEMO text -->
  <text x="60" y="25" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">DEMO</text>
  
  <!-- Pulsing effect -->
  <path d="M10 0 L110 0 L120 20 L110 40 L10 40 L0 20 Z" fill="none" stroke="#FFFF00" stroke-width="1" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
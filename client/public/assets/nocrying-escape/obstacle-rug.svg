<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- RUG bundle obstacle -->
  <ellipse cx="32" cy="50" rx="25" ry="8" fill="#8B0000" opacity="0.6"/>
  
  <!-- Main rug bundle -->
  <rect x="12" y="20" width="40" height="32" rx="8" fill="#B22222" stroke="#8B0000" stroke-width="2"/>
  
  <!-- Rope binding -->
  <rect x="8" y="28" width="48" height="4" rx="2" fill="#D2691E"/>
  <rect x="8" y="40" width="48" height="4" rx="2" fill="#D2691E"/>
  
  <!-- RUG text -->
  <text x="32" y="38" font-family="Arial, sans-serif" font-size="12" fill="#FFD700" text-anchor="middle" font-weight="bold">RUG</text>
  
  <!-- Danger glow effect -->
  <rect x="12" y="20" width="40" height="32" rx="8" fill="none" stroke="#FF0000" stroke-width="1" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Warning symbols -->
  <polygon points="32,12 36,18 28,18" fill="#FF0000"/>
  <text x="32" y="16" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">!</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A0E4E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2D1B69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0F23;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background gradient -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Neon grid overlay -->
  <rect width="1280" height="720" fill="url(#grid)"/>
  
  <!-- Far background mountains/structures -->
  <polygon points="0,500 200,300 400,400 600,250 800,350 1000,200 1280,300 1280,720 0,720" fill="#1A0B3A" opacity="0.8"/>
  
  <!-- Mid-ground structures -->
  <polygon points="100,600 300,450 500,550 700,400 900,500 1100,350 1280,450 1280,720 0,720" fill="#2D1B69" opacity="0.6"/>
  
  <!-- Ground -->
  <rect x="0" y="600" width="1280" height="120" fill="#0F0F23"/>
  <rect x="0" y="600" width="1280" height="8" fill="#00FFFF" opacity="0.5"/>
  
  <!-- Neon accent lines -->
  <line x1="0" y1="180" x2="1280" y2="180" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="540" x2="1280" y2="540" stroke="#FF6B35" stroke-width="1" opacity="0.3"/>
  
  <!-- Floating neon particles -->
  <circle cx="200" cy="150" r="2" fill="#00FFFF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="200" r="3" fill="#FF6B35" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="120" r="2" fill="#FFD700" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Character body -->
  <rect x="16" y="20" width="32" height="32" rx="4" fill="#00FFFF" stroke="#0080FF" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="32" cy="14" r="8" fill="#FFD700" stroke="#FF8C00" stroke-width="2"/>
  
  <!-- NoCrying headband -->
  <rect x="22" y="8" width="20" height="4" rx="2" fill="#FF6B35"/>
  <text x="32" y="11" font-family="Arial, sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">NOCRY</text>
  
  <!-- Eyes -->
  <circle cx="28" cy="12" r="2" fill="#000"/>
  <circle cx="36" cy="12" r="2" fill="#000"/>
  
  <!-- Arms (running position) -->
  <rect x="12" y="24" width="8" height="20" rx="4" fill="#00FFFF" stroke="#0080FF" stroke-width="1"/>
  <rect x="44" y="28" width="8" height="16" rx="4" fill="#00FFFF" stroke="#0080FF" stroke-width="1"/>
  
  <!-- Legs (running position) -->
  <rect x="18" y="48" width="8" height="12" rx="4" fill="#FFD700" stroke="#FF8C00" stroke-width="1"/>
  <rect x="38" y="52" width="8" height="8" rx="4" fill="#FFD700" stroke="#FF8C00" stroke-width="1"/>
  
  <!-- Motion lines -->
  <line x1="4" y1="32" x2="14" y2="32" stroke="#00FFFF" stroke-width="2" opacity="0.7"/>
  <line x1="6" y1="36" x2="16" y2="36" stroke="#00FFFF" stroke-width="2" opacity="0.5"/>
  <line x1="4" y1="40" x2="14" y2="40" stroke="#00FFFF" stroke-width="2" opacity="0.3"/>
</svg>